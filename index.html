<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CritRoll - היכל הגורל</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="main-body">

    <div id="login-screen">
        <h1>היכל הגורל</h1>
        <div class="login-card">
            <input type="text" id="player-name" placeholder="זהות השחקן" autocomplete="off">
            <input type="text" id="char-name" placeholder="שם הגיבור/ה" autocomplete="off">
            <div style="display:flex; justify-content:center; align-items:center; gap:10px; color:white; margin-bottom:15px;">
                <span>צבע קובייה:</span> 
                <input type="color" id="user-color" value="#e74c3c" style="width:40px; height:40px; border:none; background:none; cursor:pointer;">
            </div>
            <button id="join-btn" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">התחל בהרפתקה</button>
        </div>
    </div>

    <div id="game-screen">
        <div id="side-panel">
            <h3 style="margin:0 0 10px 0; font-size: 16px;">סדר הקרב</h3>
            <div id="init-list"></div>
            <div style="margin-top:auto; display:flex; flex-direction:column; gap:5px;">
                <div style="font-size:11px; opacity:0.8;">הרפתקנים בחדר: <span id="online-count">0</span></div>
                <button id="reset-init-btn" style="background:#444; font-size:10px; padding:5px; color:white; border:none; border-radius:4px; cursor:pointer;">לסיים את הקרב (DM)</button>
                <button id="mute-btn" style="background:#222; font-size:10px; padding:5px; color:white; border:none; border-radius:4px; cursor:pointer;">🔇 השתק</button>
            </div>
        </div>
        <div id="main-area">
            <div id="log-container">
