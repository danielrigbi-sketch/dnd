<!DOCTYPE html>

<html lang="he" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>CritRoll - DND Dice Room</title>
<link rel="icon" type="image/jpeg" href="logo.png">
    <link rel="stylesheet" href="style.css">

</head>

<body id="main-body">



    <div id="login-screen">

<img src="logo.png" alt="CritRoll Logo" class="main-logo">
        <div class="login-card">

            <input type="text" id="player-name" placeholder="שם השחקן" autocomplete="off">

            <input type="text" id="char-name" placeholder="שם הדמות" autocomplete="off">

            <div style="display:flex; justify-content:center; align-items:center; gap:10px; color:white; margin-bottom:15px;">

                <span>צבע קובייה:</span> <input type="color" id="user-color" value="#e74c3c" style="width:40px; height:40px; border:none; background:none; cursor:pointer;">

            </div>

            <button id="join-btn" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">הצטרף למשחק</button>

        </div>

    </div>



    <div id="game-screen">

        <div id="side-panel">
<img src="logo.png" alt="Small Logo" class="side-logo">
            <h3 style="margin:0 0 10px 0; font-size: 16px;">סדר יוזמה</h3>

            <div id="init-list"></div>

            <div style="margin-top:auto; display:flex; flex-direction:column; gap:5px;">

                <div style="font-size:11px; opacity:0.5;">מחוברים: <span id="online-count">0</span></div>

                <button id="reset-init-btn" style="background:#444; font-size:10px; padding:5px; color:white; border:none; border-radius:4px; cursor:pointer;">איפוס קרב (DM)</button>

                <button id="mute-btn" style="background:#222; font-size:10px; padding:5px; color:white; border:none; border-radius:4px; cursor:pointer;">🔇 השתק</button>

            </div>

        </div>

        <div id="main-area">

            <div id="log-container">

                <div style="font-weight:bold; border-bottom:1px solid #ccc; margin-bottom:5px;">לוג הטלות:</div>

                <div id="roll-log"></div>

            </div>

            <div id="dice-stage">

                <div id="dice-visual" class="dice-container" style="display: none;"><svg id="dice-svg" viewBox="0 0 100 100"></svg><div id="result-text"></div></div>

                <div id="empty-state" style="color:#555; font-style: italic;">ממתין להטלה...</div>

            </div>

           <div id="controls">
    <div style="display: flex; align-items: center; gap: 5px; margin-left: 10px;">
        <span style="font-size: 14px; color: var(--parchment);">תוסף:</span>
        <input type="number" id="mod-input" value="0">
    </div>
    
    <button class="dice-btn" data-type="d4">D4</button>
    <button class="dice-btn" data-type="d6">D6</button>
    <button class="dice-btn" data-type="d8">D8</button>
    <button class="dice-btn" data-type="d10">D10</button>
    <button class="dice-btn" data-type="d12">D12</button>
    <button class="dice-btn" data-type="d20">D20</button>
    
    <button id="adv-btn" class="special-roll-btn" style="background: linear-gradient(145deg, #4e6e5d, #2d4238);">יתרון</button>
    <button id="dis-btn" class="special-roll-btn" style="background: linear-gradient(145deg, #8c5151, #5a3232);">חיסרון</button>
    
    <button id="init-btn">⚡</button>
</div>
        </div>

    </div>



    <script type="module" src="app.js"></script>

</body>

</html>
