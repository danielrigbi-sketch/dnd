<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CritRoll - DND Virtual Tabletop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/jpeg" href="assets/logo.png">
    
    <link rel="stylesheet" href="css/style.css?v=110">
    <link rel="stylesheet" href="css/diceStyles.css">
</head>
<body id="main-body" style="margin: 0; height: 100vh; overflow: hidden; background-color: #2c1e16;">

    <button id="lang-toggle-btn" style="position: absolute; top: 15px; left: 15px; z-index: 2000; background: rgba(0,0,0,0.6); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;">English</button>

    <div id="lobby-wrapper" style="position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; background-image: url('https://as2.ftcdn.net/jpg/03/19/51/81/1000_F_319518163_MFy3GSyG5d382jMYkeiqa3rhixvrUX6h.jpg'); background-size: cover; background-position: center; z-index: 1000;">
        <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.7); z-index: 0;"></div>

        <div id="auth-screen" style="position: relative; z-index: 10; text-align: center; background: rgba(44, 62, 80, 0.9); padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 2px solid #e74c3c; width: 90%; max-width: 400px;">
            <img src="assets/logo.png" alt="CritRoll Logo" style="max-width: 180px; margin-bottom: 20px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));">
            <h1 data-i18n="app_title" style="color: white; margin-bottom: 10px; font-size: 24px;"></h1>
            <p data-i18n="app_desc" style="color: #ccc; margin-bottom: 30px; font-size: 14px;"></p>
            
            <button id="google-login-btn" style="background: white; color: #333; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; transition: 0.2s;">
                <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" style="width:20px; height:20px;">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.7 17.74 9.5 24 9.5z"></path>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.2-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                </svg>
                <span data-i18n="login_google"></span>
            </button>
        </div>

        <div id="lobby-screen" style="display: none; position: relative; z-index: 10; width: 95%; max-width: 800px; background: rgba(30, 30, 30, 0.95); border-radius: 12px; border: 1px solid #444; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.8);">
            <header style="background: #2c3e50; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e74c3c;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <img id="user-avatar" src="assets/logo.png" style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid #f1c40f; object-fit: cover;">
                    <div>
                        <div style="color: #f1c40f; font-weight: bold; font-size: 16px;"><span data-i18n="hello"></span>, <span id="user-display-name"></span></div>
                        <div style="color: #aaa; font-size: 12px;" id="user-email"></div>
                    </div>
                </div>
                <button id="logout-btn" data-i18n="logout" style="background: transparent; color: #ff7675; border: 1px solid #ff7675; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;"></button>
            </header>

            <div style="display: flex; flex-direction: row; flex-wrap: wrap; padding: 20px; gap: 20px;">
                <div style="flex: 1; min-width: 250px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 8px; border: 1px dashed #666;">
                    <h3 data-i18n="game_room_title" style="color: white; margin: 0; margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px;"></h3>
                    <div style="margin-bottom: 20px;">
                        <div data-i18n="player_join_title" style="color: #ccc; font-size: 13px; margin-bottom: 8px;"></div>
                        <div style="display: flex; gap: 5px;">
                            <input type="text" id="room-code-input" data-i18n="room_code_ph" style="flex: 1; padding: 10px; border-radius: 6px; border: none; text-align: center; font-size: 16px; font-weight: bold;">
                            <button id="join-room-btn" data-i18n="join_btn" style="background: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; display: none;"></button>
                        </div>
                        <div data-i18n="vault_hint" style="font-size: 11px; color: #aaa; margin-top: 5px;"></div>
                    </div>
                    <div style="border-top: 1px dashed #555; padding-top: 15px;">
                        <div data-i18n="dm_create_title" style="color: #ccc; font-size: 13px; margin-bottom: 8px;"></div>
                        <button id="create-room-btn" data-i18n="create_room_btn" style="width: 100%; background: #2c3e50; color: white; border: 1px solid #34495e; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;"></button>
                    </div>
                </div>

                <div style="flex: 1; min-width: 250px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 8px; border: 1px dashed #666;">
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 15px;">
                        <h3 data-i18n="vault_title" style="color: white; margin: 0;"></h3>
                        <button id="new-char-btn" data-i18n="new_char_btn" style="background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: bold;"></button>
                    </div>
                    <div id="vault-list" style="display: flex; flex-direction: column; gap: 10px; max-height: 250px; overflow-y: auto; padding-right: 5px;">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div id="char-builder-modal" style="display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1100; justify-content: center; align-items: center; padding: 20px;">
        <div style="background: #2c3e50; width: 100%; max-width: 450px; border-radius: 12px; padding: 20px; border: 2px solid #f39c12; max-height: 95vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.9);">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 15px;">
                <h2 data-i18n="cb_title" style="margin: 0; color: #f1c40f; font-size: 20px;"></h2>
                <button id="close-builder-btn" style="background: none; border: none; color: #aaa; font-size: 24px; cursor: pointer;">&times;</button>
            </div>

            <div style="margin-bottom: 15px; text-align: center;">
                <div data-i18n="cb_portrait" style="font-size: 12px; color: #ccc; margin-bottom: 5px;"></div>
                <div style="display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;">
                    <img src="https://api.dicebear.com/8.x/adventurer/svg?seed=human_m&backgroundColor=f1c40f" class="builder-portrait-btn">
                    <img src="https://api.dicebear.com/8.x/adventurer/svg?seed=elf_f&backgroundColor=2ecc71" class="builder-portrait-btn">
                    <img src="https://api.dicebear.com/8.x/adventurer/svg?seed=dwarf_m&backgroundColor=e67e22" class="builder-portrait-btn">
                    <img src="https://api.dicebear.com/8.x/adventurer/svg?seed=tiefling_f&backgroundColor=c0392b" class="builder-portrait-btn">
                    <img src="https://api.dicebear.com/8.x/adventurer/svg?seed=halfelf_m&backgroundColor=1abc9c" class="builder-portrait-btn">
                </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="cb-name" class="builder-input" data-i18n="cb_name_ph" autocomplete="off">
                <div style="display: flex; gap: 5px;">
                    <select id="cb-race" class="builder-input" style="width: 50%;">
                        <option value="" disabled selected data-i18n="cb_race"></option>
                        <option value="Human" data-i18n="race_human"></option>
                        <option value="Elf" data-i18n="race_elf"></option>
                        <option value="Dwarf" data-i18n="race_dwarf"></option>
                    </select>
                    <select id="cb-class" class="builder-input" style="width: 50%;">
                        <option value="" disabled selected data-i18n="cb_class"></option>
                        <option value="Fighter" data-i18n="class_fighter"></option>
                        <option value="Wizard" data-i18n="class_wizard"></option>
                        <option value="Rogue" data-i18n="class_rogue"></option>
                        <option value="Cleric" data-i18n="class_cleric"></option>
                    </select>
                </div>

                <div style="display: flex; gap: 5px;">
                    <input type="number" id="cb-ac" class="builder-input" data-i18n="cb_ac" style="width: 25%;">
                    <input type="number" id="cb-speed" class="builder-input" data-i18n="cb_speed" style="width: 25%;">
                    <input type="number" id="cb-pp" class="builder-input" data-i18n="cb_pp" style="width: 25%;">
                    <input type="number" id="cb-init" class="builder-input" data-i18n="cb_init" style="width: 25%;">
                </div>

                <div style="display: flex; gap: 5px;">
                    <input type="number" id="cb-hp" class="builder-input" data-i18n="cb_hp" style="width: 100%;">
                </div>

                <div style="display: flex; gap: 5px;">
                    <input type="number" id="cb-melee" class="builder-input" data-i18n="cb_melee" style="width: 25%;">
                    <select id="cb-melee-dmg" class="builder-input" style="width: 25%;">
                        <option value="1d4">1d4</option>
                        <option value="1d6" selected>1d6</option>
                        <option value="1d8">1d8</option>
                        <option value="1d10">1d10</option>
                        <option value="1d12">1d12</option>
                        <option value="2d6">2d6</option>
                    </select>
                    <input type="number" id="cb-ranged" class="builder-input" data-i18n="cb_ranged" style="width: 25%;">
                    <select id="cb-ranged-dmg" class="builder-input" style="width: 25%;">
                        <option value="1d4">1d4</option>
                        <option value="1d6" selected>1d6</option>
                        <option value="1d8">1d8</option>
                        <option value="1d10">1d10</option>
                        <option value="1d12">1d12</option>
                    </select>
                </div>

                <div style="margin-top: 15px; border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 10px;">
                    <div data-i18n="cb_attacks_title" style="font-size: 14px; color: #f1c40f; margin-bottom: 8px; font-weight: bold;"></div>
                    <div id="custom-attacks-list" style="display: flex; flex-direction: column; gap: 8px;">
                        </div>
                    <button id="add-custom-attack-btn" type="button" data-i18n="cb_add_attack" style="background: rgba(52, 152, 219, 0.3); color: #3498db; border: 1px dashed #3498db; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-top: 10px; width: 100%; transition: 0.2s;"></button>
                </div>

                <button id="save-char-btn" data-i18n="cb_save_btn" style="background: #27ae60; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 20px;"></button>
            </div>
        </div>
    </div>

    <div id="game-screen" style="display: none; height: 100%; flex-direction: row; width: 100%;">
        <div id="side-panel">
            <img src="assets/logo.png" alt="Small Logo" class="side-logo">
            <h3 data-i18n="party_title" style="margin:0 0 10px 0; font-size: 16px; text-align:center;"></h3>
            
            <div id="active-roller-banner">
                <span data-i18n="rolling_as"></span>&nbsp;
                <span id="active-roller-name" style="color:#f1c40f;"></span>
                <button id="reset-roller-btn" onclick="window.resetRoller()" data-i18n="back_btn" style="background:none; border:none; color:white; font-size:12px; cursor:pointer; text-decoration:underline;"></button>
            </div>

            <div id="init-list"></div>
            
            <div id="dm-npc-controls" style="display:none; flex-direction:column; gap:8px; margin-bottom:15px; padding:12px; background:rgba(0,0,0,0.4); border-radius:8px; border:1px dashed rgba(241, 196, 15, 0.5);">
                <div data-i18n="dm_panel_title" style="font-size: 12px; color: #f1c40f; font-weight: bold; text-align: center;"></div>
                <select id="npc-preset" style="padding:6px; font-size:12px; border-radius:4px; border:none; width:100%; text-align:center; background:#fff; color:#333;" onchange="window.handlePresetChange(this.value)">
                    <option value="custom" data-i18n="custom_npc"></option>
                    <option value="goblin" data-i18n="mon_goblin"></option>
                    <option value="skeleton" data-i18n="mon_skeleton"></option>
                    <option value="zombie" data-i18n="mon_zombie"></option>
                    <option value="bandit" data-i18n="mon_bandit"></option>
                    <option value="orc" data-i18n="mon_orc"></option>
                    <option value="wolf" data-i18n="mon_wolf"></option>
                    <option value="spider" data-i18n="mon_spider"></option>
                    <option value="owlbear" data-i18n="mon_owlbear"></option>
                    <option value="troll" data-i18n="mon_troll"></option>
                    <option value="mindflayer" data-i18n="mon_mindflayer"></option>
                    <option value="vampire" data-i18n="mon_vampire"></option>
                    <option value="dragon" data-i18n="mon_dragon"></option>
                    <option value="beholder" data-i18n="mon_beholder"></option>
                    <option value="lich" data-i18n="mon_lich"></option>
                </select>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="npc-name" data-i18n="ph_specific_name" style="padding:6px; font-size:12px; border-radius:4px; border:none; width:50%; text-align:center; background:#fff; color:#333;">
                    <input type="text" id="npc-class" data-i18n="ph_class_opt" style="padding:6px; font-size:12px; border-radius:4px; border:none; width:50%; text-align:center; background:#fff; color:#333;">
                </div>
                <div style="display:flex; gap:5px;">
                    <input type="number" id="npc-hp" data-i18n="ph_hp" style="padding:6px; font-size:12px; border-radius:4px; border:none; width:33%; text-align:center; background:#fff; color:#333;">
                    <input type="number" id="npc-init" data-i18n="ph_init" style="padding:6px; font-size:12px; border-radius:4px; border:none; width:33%; text-align:center; background:#fff; color:#333;">
                    <input type="number" id="npc-count" data-i18n="ph_count" value="1" style="padding:6px; font-size:12px; border-radius:4px; border:none; width:33%; text-align:center; background:#fff; color:#333;">
                </div>
                
                <div style="display:flex; gap:5px;">
                    <input type="number" id="npc-melee" data-i18n="ph_melee" style="padding:6px; font-size:12px; border-radius:4px; border:none; width:25%; text-align:center; background:#fff; color:#333;">
                    <input type="text" id="npc-melee-dmg" data-i18n="ph_melee_dmg" style="padding:6px; font-size:12px; border-radius:4px; border:none; width:25%; text-align:center; background:#fff; color:#333;">
                    <input type="number" id="npc-ranged" data-i18n="ph_ranged" style="padding:6px; font-size:12px; border-radius:4px; border:none; width:25%; text-align:center; background:#fff; color:#333;">
                    <input type="text" id="npc-ranged-dmg" data-i18n="ph_ranged_dmg" style="padding:6px; font-size:12px; border-radius:4px; border:none; width:25%; text-align:center; background:#fff; color:#333;">
                </div>

                <div style="display:flex; align-items:center; justify-content:center; gap:5px; margin-top:4px;">
                    <input type="checkbox" id="npc-hidden" checked style="width:auto; margin:0; cursor:pointer;">
                    <label for="npc-hidden" data-i18n="hide_from_players" style="color:#eee; font-size:12px; cursor:pointer;"></label>
                </div>
                <button id="add-npc-btn" class="side-btn" data-i18n="add_npc_roll" style="background:#27ae60; padding:6px; font-size: 12px; margin-top:4px;" onclick="window.addNPC()"></button>
            </div>

            <div class="side-footer">
                <div class="side-buttons-row">
                    <button id="master-combat-btn" class="side-btn" data-i18n="open_combat" style="display:none; background:#2c3e50;" onclick="window.toggleCombat()"></button>
                    <button id="mute-btn" class="side-btn" data-i18n="mute_sound" onclick="window.toggleMute()"></button>
                </div>
            </div>
        </div>

        <div id="main-area">
            <div id="game-layout">
                <div id="dice-arena">
                    <div id="log-container">
                        <div class="log-header" data-i18n="event_log"></div>
                        <div id="roll-log"></div>
                    </div>
                    <div id="dice-box-canvas"></div>
                    <div id="center-stage">
                        <div id="dice-visual" style="display: none;"><div id="result-text"></div></div>
                        <div id="empty-state" data-i18n="waiting_roll" style="color:#555; font-style: italic; position: relative; z-index: 10;"></div>
                    </div>
                </div>
                
                <div id="controls">
                    <div class="mod-container">
                        <span data-i18n="mod_label" style="font-size: 14px; color: var(--parchment); margin-left: 5px;"></span>
                        <input type="number" id="mod-input" value="0">
                    </div>
                    <button id="init-btn" data-i18n="waiting_combat" disabled style="opacity: 0.3;" onclick="window.rollInit()"></button>
                    
                    <button id="open-dice-menu" data-i18n="dice_menu" class="special-roll-btn" style="background:#3498db; flex: 0.5;" onclick="document.getElementById('custom-dice-menu').style.display='flex'"></button>
                    
                    <button id="adv-btn" data-i18n="adv" class="special-roll-btn adv" onclick="window.setMode('adv')"></button>
                    <button id="dis-btn" data-i18n="dis" class="special-roll-btn dis" onclick="window.setMode('dis')"></button>

                    <div id="custom-dice-menu">
                        <div style="width:100%; text-align:left; margin-bottom:5px;">
                            <button style="background:none; border:none; color:#aaa; cursor:pointer; font-size:20px; line-height: 0.5;" onclick="document.getElementById('custom-dice-menu').style.display='none'">&times;</button>
                        </div>
                        <button class="dice-btn" onclick="window.roll('d4'); document.getElementById('custom-dice-menu').style.display='none'">D4</button>
                        <button class="dice-btn" onclick="window.roll('d6'); document.getElementById('custom-dice-menu').style.display='none'">D6</button>
                        <button class="dice-btn" onclick="window.roll('d8'); document.getElementById('custom-dice-menu').style.display='none'">D8</button>
                        <button class="dice-btn" onclick="window.roll('d10'); document.getElementById('custom-dice-menu').style.display='none'">D10</button>
                        <button class="dice-btn" onclick="window.roll('d12'); document.getElementById('custom-dice-menu').style.display='none'">D12</button>
                        <button class="dice-btn" onclick="window.roll('d20'); document.getElementById('custom-dice-menu').style.display='none'">D20</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script type="module" src="js/lobby.js?v=110"></script>
</body>
</html>
